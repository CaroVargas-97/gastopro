<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GastosPRO">
<meta name="theme-color" content="#5b4eff">
<link rel="manifest" href="/manifest.json">
<title>GastosPRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#5b4eff;--accent2:#4338e0;
  --bg:#f8f7f4;--bg2:#ffffff;--bg3:#f2f1ee;
  --border:#e5e3de;--border2:#d6d4cf;
  --text:#1a1917;--text2:#6b6963;--text3:#a8a49e;
  --green:#16a34a;--red:#dc2626;
  --radius:10px;--radius-sm:7px;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:15px}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:360px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.login-logo-box{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.login-logo-name{font-size:18px;font-weight:700}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.finput{width:100%;height:44px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 12px;font-size:15px;background:var(--bg3);color:var(--text);outline:none;-webkit-appearance:none}
.finput:focus{border-color:var(--accent);background:var(--bg2)}
.ff{margin-bottom:14px}
.btn-login{width:100%;height:48px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:active{background:var(--accent2)}
.login-err{font-size:13px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
.pass-wrap{position:relative}
.pass-wrap .finput{padding-right:44px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;display:flex;align-items:center;padding:4px}

/* APP */
#app{display:none;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-box{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.topbar-name{font-size:15px;font-weight:700}
.topbar-user{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;display:flex;align-items:center}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}

/* FORM */
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.minput{width:100%;height:46px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 12px;font-size:15px;background:var(--bg3);color:var(--text);outline:none;-webkit-appearance:none;-webkit-appearance:none}
.minput:focus{border-color:var(--accent);background:var(--bg2)}
.btn-save{width:100%;height:50px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-save:active{background:var(--accent2);transform:scale(.98)}
.btn-save:disabled{background:var(--border2);cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1917;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:30px;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.nav-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-tab.active{color:var(--accent)}

/* HISTORIAL */
.hist-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px}
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px}
.hist-icon{width:32px;height:32px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-desc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.hist-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hist-amt{font-size:13px;font-weight:700;color:var(--text);flex-shrink:0}
.hist-empty{font-size:13px;color:var(--text3);text-align:center;padding:16px 0}
.hist-loading{font-size:12px;color:var(--text3);text-align:center;padding:12px 0}
.edit-hist-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;font-size:12px;display:flex;align-items:center}
.edit-hist-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* CALENDAR */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:13px;font-weight:700;color:var(--text)}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:2px 8px;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;font-weight:700;color:var(--text3);text-align:center;padding-bottom:4px;text-transform:uppercase}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:6px;cursor:pointer;min-height:32px;gap:2px}
.cal-day:active{background:var(--bg3)}
.cal-day.has-entry{cursor:pointer}
.cal-day.selected{background:var(--accent)}
.cal-day.selected .cal-dn{color:#fff}
.cal-day.selected .cal-dot{background:#fff}
.cal-day.today .cal-dn{color:var(--accent);font-weight:700}
.cal-day.empty{pointer-events:none}
.cal-dn{font-size:12px;color:var(--text)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-dot.hidden{visibility:hidden}
.cal-filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;min-height:20px}
.cal-filter-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.cal-clear{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
.modal-overlay.open{display:flex;align-items:flex-end}
.modal-sheet{background:var(--bg2);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.btn-modal-save{width:100%;height:48px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-modal-cancel{width:100%;height:44px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:15px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-box">GP</div>
      <span class="login-logo-name">GastosPRO</span>
    </div>
    <div class="login-title">Hola 👋</div>
    <div class="login-sub">Iniciá sesión para cargar gastos</div>
    <div class="ff"><label class="flabel">Email</label><input class="finput" type="email" id="l-email" placeholder="tu@email.com" autocomplete="email"></div>
    <div class="ff"><label class="flabel">Contraseña</label>
      <div class="pass-wrap">
        <input class="finput" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye-btn" type="button" id="eye-toggle" onclick="togglePass()">
          <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-login" onclick="doLogin()" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-box">GP</div>
      <span class="topbar-name">GastosPRO</span>
    </div>
    <div class="topbar-user">
      <span id="top-user"></span>
      <button class="logout-btn" onclick="doLogout()" title="Salir">✕</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- se renderiza por tab -->
  </div>

  <nav class="bottomnav">
    <button class="nav-tab active" onclick="goTab('vida',this)" id="tab-vida">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Vida
    </button>
    <button class="nav-tab" onclick="goTab('team',this)" id="tab-team">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.85"/></svg>
      Team
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEdit()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="edit-modal-title">Editar</div>
    <div id="edit-modal-body"></div>
    <button class="btn-modal-save" onclick="saveEdit()">Guardar cambios</button>
    <button class="btn-modal-cancel" onclick="closeEdit()">Cancelar</button>
  </div>
</div>

<script>
const SUPA_URL='https://kujzslrpdfbscltnsquv.supabase.co';
const SUPA_KEY='sb_publishable_0XEjYVJ8j5Dlqa6SERapvA_VgOMLzWF';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const CATS_VIDA=['DEPARTAMENTO','TARJETAS','COMIDAS','AUTO','MOTO','VIAJES','SUSCRIPCIONES','CAJA CHICA ','OTROS'];
const CATS_TEAM=['TEAM','MUN','OTROS'];
const CATLAB={'DEPARTAMENTO':'Departamento','TARJETAS':'Tarjetas','OTROS':'Otros','AUTO':'Auto','MOTO':'Moto','CAJA CHICA ':'Caja chica','VIAJES':'Viajes','TEAM':'Gastos del team','COMIDAS':'Comidas / delivery','SUSCRIPCIONES':'Suscripciones','MUN':'MUN','INVERSIONES':'Inversiones'};

let currentUser=null;
let currentTab='vida';
let tcVal=1370;
let editCache={};
let editId=null;
let editSection=null;
let calState={vida:{year:new Date().getFullYear(),month:new Date().getMonth(),selected:null,records:[]},team:{year:new Date().getFullYear(),month:new Date().getMonth(),selected:null,records:[]}};

function mesActual(){return MESES[new Date().getMonth()];}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  if(!email||!pass){err.textContent='Completá email y contraseña';return;}
  btn.textContent='Entrando...';btn.disabled=true;err.textContent='';
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    currentUser=data.user;
    await fetchTC();
    showApp();
  }catch(e){
    err.textContent=e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message;
    btn.textContent='Entrar';btn.disabled=false;
  }
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  const name=currentUser.email.split('@')[0];
  document.getElementById('top-user').textContent=name;
  goTab('vida',document.getElementById('tab-vida'));
}

async function fetchTC(){
  try{
    const r=await fetch('https://dolarapi.com/v1/dolares/blue');
    const d=await r.json();
    tcVal=Math.round((d.compra+d.venta)/2)||tcVal;
  }catch(e){}
}

function goTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab){
  const el=document.getElementById('main-content');
  if(tab==='vida'){el.innerHTML=formVida();loadHistVida();}
  else if(tab==='team'){el.innerHTML=formTeam();loadHistTeam();}
}

function togglePass(){
  const i=document.getElementById('l-pass');
  const showing=i.type==='text';
  i.type=showing?'password':'text';
  document.getElementById('eye-icon').innerHTML=showing
    ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

function arsF(v){return'$'+Math.round(v).toLocaleString('es-AR');}

function histItem(id,section,icon,desc,sub,amt){
  return'<div class="hist-item">'+
    '<div class="hist-icon">'+icon+'</div>'+
    '<div class="hist-info">'+
      '<div class="hist-desc">'+desc+'</div>'+
      '<div class="hist-sub">'+sub+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
      '<div class="hist-amt">'+amt+'</div>'+
      '<button class="edit-hist-btn" onclick="openEdit(\''+section+'\',\''+id+'\')">'+
        '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'+
      '</button>'+
    '</div>'+
  '</div>';
}

function openEdit(section,id){
  const r=editCache[id];
  if(!r)return;
  editId=id;editSection=section;
  const modal=document.getElementById('edit-modal');
  const title=document.getElementById('edit-modal-title');
  const body=document.getElementById('edit-modal-body');
  if(section==='vida'){
    title.textContent='Editar gasto personal';
    body.innerHTML=
      '<div class="ff" style="margin-bottom:12px"><label class="flabel">Descripción</label><input class="minput" id="em-desc" value="'+( r.descripcion||'')+'"></div>'+
      '<div class="row2" style="margin-bottom:12px">'+
        '<div class="ff"><label class="flabel">Mes</label><select class="minput" id="em-mes">'+mesOpts(r.mes)+'</select></div>'+
        '<div class="ff"><label class="flabel">Monto ARS</label><input class="minput" type="number" id="em-val" value="'+(r.valor||0)+'"></div>'+
      '</div>'+
      '<div class="row2" style="margin-bottom:16px">'+
        '<div class="ff"><label class="flabel">Método</label><select class="minput" id="em-met"><option value="CREDITO" '+(r.metodo==='CREDITO'?'selected':'')+'>Crédito</option><option value="EFECTIVO" '+(r.metodo==='EFECTIVO'?'selected':'')+'>Efectivo</option></select></div>'+
        '<div class="ff"><label class="flabel">Fuente</label><input class="minput" id="em-fuente" value="'+(r.fuente||'')+'" placeholder="AMEX..."></div>'+
      '</div>';
  }else{
    title.textContent='Editar gasto del team';
    body.innerHTML=
      '<div class="ff" style="margin-bottom:12px"><label class="flabel">Descripción</label><input class="minput" id="em-desc" value="'+(r.descripcion||'')+'"></div>'+
      '<div class="row2" style="margin-bottom:16px">'+
        '<div class="ff"><label class="flabel">Mes</label><select class="minput" id="em-mes">'+mesOpts(r.mes)+'</select></div>'+
        '<div class="ff"><label class="flabel">Monto ARS</label><input class="minput" type="number" id="em-val" value="'+(r.valor_ars||0)+'"></div>'+
      '</div>';
  }
  modal.classList.add('open');
}

function closeEdit(){
  document.getElementById('edit-modal').classList.remove('open');
  editId=null;editSection=null;
}

async function saveEdit(){
  const desc=document.getElementById('em-desc').value.trim().toUpperCase();
  const mes=document.getElementById('em-mes').value;
  const val=parseFloat(document.getElementById('em-val').value)||0;
  if(!desc||!val){showToast('Completá los campos');return;}
  const btn=document.querySelector('.btn-modal-save');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    if(editSection==='vida'){
      const met=document.getElementById('em-met').value;
      const fuente=document.getElementById('em-fuente').value.trim();
      await sb.from('transacciones').update({descripcion:desc,mes,metodo:met,valor:val,usd:val/tcVal,fuente}).eq('id',editId);
    }else{
      await sb.from('cuentas_movimientos').update({descripcion:desc,mes,valor_ars:val,valor_usd:parseFloat((val/tcVal).toFixed(2))}).eq('id',editId);
    }
    showToast('✓ Cambios guardados');
    closeEdit();
    if(editSection==='vida'||currentTab==='vida')loadHistVida();
    if(editSection==='team'||currentTab==='team')loadHistTeam();
  }catch(e){showToast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='Guardar cambios';
}

async function loadHistVida(){
  const calEl=document.getElementById('cal-vida');
  const box=document.getElementById('hist-vida');
  if(!box)return;
  const st=calState['vida'];
  const from=new Date(st.year,st.month,1).toISOString();
  const to=new Date(st.year,st.month+1,0,23,59,59).toISOString();
  try{
    const {data,error}=await sb.from('transacciones')
      .select('id,descripcion,valor,mes,metodo,fuente,cat,created_at')
      .gte('created_at',from).lte('created_at',to)
      .order('created_at',{ascending:false});
    if(error)throw error;
    data.forEach(r=>{editCache[r.id]=r;});
    st.records=data;
    if(calEl)calEl.innerHTML=renderCal('vida');
    renderHistList('vida');
  }catch(e){if(box)box.innerHTML='<div class="hist-empty">Error al cargar</div>';}
}

async function loadHistTeam(){
  const calEl=document.getElementById('cal-team');
  const box=document.getElementById('hist-team');
  if(!box)return;
  const st=calState['team'];
  const from=new Date(st.year,st.month,1).toISOString();
  const to=new Date(st.year,st.month+1,0,23,59,59).toISOString();
  try{
    const {data,error}=await sb.from('cuentas_movimientos')
      .select('id,descripcion,valor_ars,mes,creado_por,metodo,created_at')
      .eq('cuenta','TEAM')
      .gte('created_at',from).lte('created_at',to)
      .order('created_at',{ascending:false});
    if(error)throw error;
    data.forEach(r=>{editCache[r.id]=r;});
    st.records=data;
    const calEl2=document.getElementById('cal-team');
    if(calEl2)calEl2.innerHTML=renderCal('team');
    renderHistList('team');
  }catch(e){if(box)box.innerHTML='<div class="hist-empty">Error al cargar</div>';}
}


function renderCal(section){
  const st=calState[section];
  const {year,month,selected,records}=st;
  const daysWithEntries=new Set(records.map(r=>{
    const d=new Date(r.created_at);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  }));
  const today=new Date();
  const todayKey=today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=new Date(year,month,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const dow=['D','L','M','X','J','V','S'];
  let cells='';
  for(let i=0;i<firstDay;i++)cells+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const key=year+'-'+(month+1)+'-'+d;
    const isSel=selected===key;
    const isToday=key===todayKey;
    const hasDot=daysWithEntries.has(key);
    cells+='<div class="cal-day'+(isSel?' selected':'')+(isToday&&!isSel?' today':'')+(hasDot?' has-entry':'')+'" onclick="selectCalDay(\''+section+'\',\''+key+'\')">'+
      '<span class="cal-dn">'+d+'</span>'+
      '<span class="cal-dot'+(hasDot?'':' hidden')+'"></span>'+
    '</div>';
  }
  return'<div class="cal-wrap">'+
    '<div class="cal-header">'+
      '<button class="cal-nav" onclick="calNav(\''+section+'\',-1)">‹</button>'+
      '<span class="cal-month">'+monthName.charAt(0).toUpperCase()+monthName.slice(1)+'</span>'+
      '<button class="cal-nav" onclick="calNav(\''+section+'\',1)">›</button>'+
    '</div>'+
    '<div class="cal-grid">'+
      dow.map(d=>'<div class="cal-dow">'+d+'</div>').join('')+
      cells+
    '</div>'+
  '</div>';
}

function calNav(section,dir){
  const st=calState[section];
  let m=st.month+dir,y=st.year;
  if(m>11){m=0;y++;}else if(m<0){m=11;y--;}
  st.month=m;st.year=y;st.selected=null;
  if(section==='vida')loadHistVida();else loadHistTeam();
}

function selectCalDay(section,key){
  const st=calState[section];
  st.selected=st.selected===key?null:key;
  const calEl=document.getElementById('cal-'+section);
  if(calEl)calEl.innerHTML=renderCal(section);
  renderHistList(section);
}

function renderHistList(section){
  const st=calState[section];
  const box=document.getElementById('hist-'+section);
  if(!box)return;
  let records=st.records;
  const filterLbl=document.getElementById('cal-filter-lbl-'+section);
  if(st.selected){
    const [y,m,d]=st.selected.split('-').map(Number);
    records=records.filter(r=>{
      const rd=new Date(r.created_at);
      return rd.getFullYear()===y&&(rd.getMonth()+1)===m&&rd.getDate()===d;
    });
    if(filterLbl)filterLbl.innerHTML='<span class="cal-filter-lbl">'+formatSelDate(st.selected)+'</span><button class="cal-clear" onclick="clearCalSel(\''+section+'\')">Ver todos</button>';
  }else{
    if(filterLbl)filterLbl.innerHTML='<span class="cal-filter-lbl">Últimos cargados</span>';
  }
  if(!records.length){box.innerHTML='<div class="hist-empty">Sin gastos para este día</div>';return;}
  if(section==='vida'){
    box.innerHTML=records.map(r=>{
      const metIcon=r.metodo==='EFECTIVO'?'💵':'💳';
      const d=r.created_at?new Date(r.created_at):null;
      const fechaStr=d?d.toLocaleDateString('es-AR',{day:'numeric',month:'short'}):'';
      const sub=(fechaStr?fechaStr+' · ':'')+( r.fuente||r.metodo||'');
      return histItem(r.id,'vida',metIcon,r.descripcion||'–',sub,arsF(r.valor));
    }).join('');
  }else{
    box.innerHTML=records.map(r=>{
      const d=r.created_at?new Date(r.created_at):null;
      const fechaStr=d?d.toLocaleDateString('es-AR',{day:'numeric',month:'short'}):'';
      const sub=(fechaStr?fechaStr+' · ':'')+( r.creado_por||'');
      return histItem(r.id,'team','👥',r.descripcion||'–',sub,arsF(r.valor_ars));
    }).join('');
  }
}

function clearCalSel(section){calState[section].selected=null;const el=document.getElementById('cal-'+section);if(el)el.innerHTML=renderCal(section);renderHistList(section);}

function formatSelDate(key){
  const [y,m,d]=key.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
}

function mesOpts(selected){
  return MESES.map(m=>'<option value="'+m+'" '+(m===selected?'selected':'')+'>'+m.charAt(0).toUpperCase()+m.slice(1)+'</option>').join('');
}
function catOpts(cats,selected){
  return cats.map(c=>'<option value="'+c+'" '+(c===selected?'selected':'')+'>'+(CATLAB[c]||c)+'</option>').join('');
}

function fechaHoyStr(){
  const d=new Date();
  return d.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

    '<div class="ff" style="margin-bottom:12px"><label class="flabel">Descripción</label><input class="minput" type="text" id="v-desc" placeholder="Ej: Rappi, Netflix, YPF..."></div>'+
    '<div class="row2" style="margin-bottom:12px">'+
      '<div class="ff"><label class="flabel">Monto ARS</label><input class="minput" type="number" id="v-val" inputmode="numeric" placeholder="0"></div>'+
      '<div class="ff"><label class="flabel">Método</label><select class="minput" id="v-met"><option value="CREDITO">Crédito</option><option value="EFECTIVO">Efectivo</option></select></div>'+
    '</div>'+

  '<div class="hist-list" id="hist-vida"><div class="hist-loading">Cargando...</div></div>';
}

function formTeam(){
  const mes=mesActual();
  return'<div class="section-title">Nuevo gasto del team</div>'+
  '<div class="form-card">'+
    '<div class="ff" style="margin-bottom:12px"><label class="flabel">Fecha</label><div class="minput" style="background:var(--bg3);color:var(--text2);display:flex;align-items:center;font-size:14px">'+fechaHoyStr()+'</div></div>'+
    '<div class="ff" style="margin-bottom:12px"><label class="flabel">Descripción</label><input class="minput" type="text" id="t-desc" placeholder="Ej: Almuerzo cliente, taxi..."></div>'+
    '<div class="row2" style="margin-bottom:12px">'+
      '<div class="ff"><label class="flabel">Monto ARS</label><input class="minput" type="number" id="t-val" inputmode="numeric" placeholder="0"></div>'+
      '<div class="ff"><label class="flabel">Método</label><select class="minput" id="t-met"><option value="CREDITO">Crédito</option><option value="EFECTIVO">Efectivo</option></select></div>'+
    '</div>'+
    '<button class="btn-save" onclick="saveTeam()">✓ Guardar gasto</button>'+
  '</div>'+
  '<div id="cal-team"></div>'+
  '<div class="cal-filter-bar" id="cal-filter-lbl-team"><span class="cal-filter-lbl">Últimos cargados</span></div>'+
  '<div class="hist-list" id="hist-team"><div class="hist-loading">Cargando...</div></div>';
}


async function saveVida(){
  const mes=mesActual();
  const cat=document.getElementById('v-cat').value;
  const desc=document.getElementById('v-desc').value.trim();
  const val=parseFloat(document.getElementById('v-val').value);
  const met=document.getElementById('v-met').value;
  const fuente=document.getElementById('v-fuente').value.trim();
  if(!desc||!val){showToast('Completá descripción y monto');return;}
  const btn=document.querySelector('.btn-save');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    await sb.from('transacciones').insert({
      user_id:currentUser.id,mes,descripcion:desc.toUpperCase(),
      metodo:met,valor:val,usd:val/tcVal,cat,fuente
    });
    showToast('✓ Gasto guardado');
    renderTab('vida');
    loadHistVida();
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='✓ Guardar gasto';}
}

async function saveTeam(){
  const mes=mesActual();
  const cat=document.getElementById('t-cat').value;
  const desc=document.getElementById('t-desc').value.trim();
  const val=parseFloat(document.getElementById('t-val').value);
  const met=document.getElementById('t-met').value;
  if(!desc||!val){showToast('Completá descripción y monto');return;}
  const btn=document.querySelector('.btn-save');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    await sb.from('cuentas_movimientos').insert({
      cuenta:'TEAM',tipo:'GASTO',descripcion:desc.toUpperCase(),
      valor_ars:val,valor_usd:parseFloat((val/tcVal).toFixed(2)),tc:tcVal,
      mes,metodo:met,fecha:new Date().toISOString().split('T')[0],
      creado_por:currentUser.email.split('@')[0]
    });
    showToast('✓ Gasto del team guardado');
    renderTab('team');
    loadHistTeam();
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='✓ Guardar gasto';}
}


function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

(async()=>{
  const {data}=await sb.auth.getSession();
  if(data.session){currentUser=data.session.user;await fetchTC();showApp();}
})();
</script>
